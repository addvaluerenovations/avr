<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Simon Liu — Add Value Renovations</title>
<meta name="description" content="Save Simon Liu's contact — Founder & Director, Add Value Renovations. Auckland design-and-build renovation specialists.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#03152D;
    --navy-soft:#0A2342;
    --gold:#B28E32;
    --gold-bright:#D4AF54;
    --cream:#F4F1EA;
    --line:rgba(178,142,50,.22);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Poppins',-apple-system,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #0A2342 0%, var(--navy) 55%, #020D1C 100%);
    color:var(--cream);
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 18px calc(28px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;
    max-width:420px;
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
    border:1px solid var(--line);
    border-radius:26px;
    padding:38px 26px 26px;
    text-align:center;
    box-shadow:0 30px 70px -30px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.05);
    position:relative;
    overflow:hidden;
  }
  /* thin gold rule top — architectural detail */
  .card::before{
    content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:64px;height:3px;border-radius:0 0 4px 4px;
    background:linear-gradient(90deg,var(--gold),var(--gold-bright));
  }
  .eyebrow{
    font-size:11px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--gold);font-weight:600;margin-bottom:22px;
  }
  .avatar{
    width:104px;height:104px;border-radius:50%;margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(145deg,#0E2C50,#06182F);
    border:2px solid var(--gold);
    box-shadow:0 0 0 6px rgba(178,142,50,.08);
    font-family:'Fraunces',serif;font-size:40px;font-weight:500;
    color:var(--gold-bright);letter-spacing:.02em;
  }
  h1{
    font-family:'Fraunces',serif;font-weight:600;
    font-size:30px;line-height:1.1;letter-spacing:-.01em;margin-bottom:6px;
  }
  .title{font-size:14px;color:rgba(244,241,234,.72);font-weight:400}
  .company{
    font-size:14px;color:var(--cream);font-weight:600;margin-top:2px;
    display:inline-flex;align-items:center;gap:7px;
  }
  .company::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--gold)}

  .save{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;margin:26px 0 8px;
    padding:17px;border:none;border-radius:15px;cursor:pointer;
    font-family:'Poppins',sans-serif;font-size:16px;font-weight:600;
    color:var(--navy);
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    box-shadow:0 12px 26px -10px rgba(178,142,50,.7);
    transition:transform .12s ease, box-shadow .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .save:active{transform:translateY(1px) scale(.99);box-shadow:0 6px 16px -10px rgba(178,142,50,.7)}
  .save svg{width:19px;height:19px;flex:none}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .act{
    display:flex;flex-direction:column;align-items:center;gap:7px;
    padding:15px 8px;border-radius:14px;text-decoration:none;
    background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);
    color:var(--cream);font-size:13px;font-weight:500;
    transition:background .15s ease, border-color .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .act:active{background:rgba(178,142,50,.12);border-color:var(--line)}
  .act svg{width:21px;height:21px;color:var(--gold-bright)}

  .footer{margin-top:26px;padding-top:20px;border-top:1px solid rgba(255,255,255,.07)}
  .tagline{
    font-family:'Fraunces',serif;font-style:italic;font-size:14px;
    color:rgba(244,241,234,.8);margin-bottom:12px;
  }
  .trust{
    display:flex;align-items:center;justify-content:center;gap:14px;
    font-size:11px;color:rgba(244,241,234,.55);letter-spacing:.02em;flex-wrap:wrap;
  }
  .trust span{display:inline-flex;align-items:center;gap:5px}
  .star{color:var(--gold-bright)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Digital Card</div>
    <div class="avatar">SL</div>
    <h1>Simon Liu</h1>
    <div class="title">Founder &amp; Director</div>
    <div class="company">Add Value Renovations</div>

    <button class="save" id="saveBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Save to Contacts
    </button>

    <div class="grid">
      <a class="act" href="tel:+64204560007">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Call
      </a>
      <a class="act" href="mailto:simon@addvaluerenovations.co.nz">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
        Email
      </a>
      <a class="act" href="https://addvaluerenovations.co.nz" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Website
      </a>
      <a class="act" href="https://maps.apple.com/?address=110+Carlton+Gore+Road,Newmarket,Auckland+1023" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Directions
      </a>
    </div>

    <div class="footer">
      <div class="tagline">One Team. One Plan. One Price.</div>
      <div class="trust">
        <span><span class="star">★</span> 4.8 Google rating</span>
        <span>10-Year Master Builder Guarantee</span>
      </div>
    </div>
  </main>

<script>
  // vCard 3.0 — best iPhone + Android compatibility
  var vcard = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "N:Liu;Simon;;;",
    "FN:Simon Liu",
    "ORG:Add Value Renovations",
    "TITLE:Founder & Director",
    "TEL;TYPE=CELL,VOICE:+64204560007",
    "EMAIL;TYPE=WORK:simon@addvaluerenovations.co.nz",
    "URL:https://addvaluerenovations.co.nz",
    "ADR;TYPE=WORK:;;110 Carlton Gore Road;Newmarket;Auckland;1023;New Zealand",
    "END:VCARD"
  ].join("\r\n");

  document.getElementById("saveBtn").addEventListener("click", function(){
    var blob = new Blob([vcard], {type:"text/vcard;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "Simon-Liu-AddValueRenovations.vcf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
  });
</script>
</body>
</html>
